<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f4f4;
      padding: 30px;
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .gallery img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      justify-content: center;
      align-items: center;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 40px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>My Image Gallery</h1>

  <div class="gallery">
    <img src="https://picsum.photos/id/1015/600/400" alt="Image 1" onclick="openImage(this.src)">
    <img src="https://picsum.photos/id/1025/600/400" alt="Image 2" onclick="openImage(this.src)">
    <img src="https://picsum.photos/id/1035/600/400" alt="Image 3" onclick="openImage(this.src)">
    <img src="https://picsum.photos/id/1045/600/400" alt="Image 4" onclick="openImage(this.src)">
    <img src="https://picsum.photos/id/1055/600/400" alt="Image 5" onclick="openImage(this.src)">
    <img src="https://picsum.photos/id/1065/600/400" alt="Image 6" onclick="openImage(this.src)">
  </div>

  <div class="lightbox" id="lightbox">
    <span class="close" onclick="closeImage()">&times;</span>
    <img id="lightbox-img" src="" alt="Large Image">
  </div>

  <script>
    function openImage(src) {
      document.getElementById("lightbox-img").src = src;
      document.getElementById("lightbox").style.display = "flex";
    }

    function closeImage() {
      document.getElementById("lightbox").style.display = "none";
    }
  </script>

</body>
</html>
